[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
(
    legacy
  | venv
  | \.venv
  | __pycache__
)
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "legacy",
    "venv",
    ".venv",
    "__pycache__",
    "dataset_stats/outputs",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # function call in default argument (FastAPI Depends/File)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-v --tb=short --color=yes"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = ["legacy", "venv", "__pycache__"]
